title: "[Integration] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Want your Fruxon agent to connect to a service we don't support yet? Let us know!

  - type: input
    id: service
    attributes:
      label: Service / platform
      description: Which third-party service do you want your agent to connect to?
      placeholder: e.g. Asana, Intercom, Zendesk, Twilio
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: API docs link
      description: Link to the service's API documentation (if available).
      placeholder: https://developers.example.com/docs
    validations:
      required: false

  - type: checkboxes
    id: auth-type
    attributes:
      label: Authentication methods
      description: How does this service authenticate API requests? Select all that apply. Leave blank if not sure.
      options:
        - label: OAuth2
        - label: API key
        - label: Bearer token
        - label: Basic auth (username/password)

  - type: textarea
    id: actions
    attributes:
      label: What actions should the agent be able to perform?
      description: List the key operations your agent needs (e.g. send message, create ticket, fetch contacts).
      placeholder: |
        - Read and create tasks
        - Assign tasks to team members
        - Get project status
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Important — planning to use it soon
        - Blocking — I need this to adopt Fruxon
    validations:
      required: true
